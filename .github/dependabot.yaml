version: 2
updates:
  # 1. Configuration for PHP (Composer)
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly" # Options: daily, weekly, monthly

  # 2. Configuration for Node.js (npm / yarn / pnpm)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"